<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mishti Ice Cream | Order Success</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Nosifer&family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-brown: #4E342E;
      --secondary-brown: #5D4037;
      --accent-red: #8B2C2C;
      --accent-pink: #FF4081;
      --bg-pink: #fff7f2;
      --success-green: #28a745;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-pink);
      color: var(--primary-brown);
      overflow-x: hidden;
    }

    .nosifer { font-family: 'Nosifer', cursive; }
    .lilita { font-family: 'Lilita One', cursive; }

    .header-drip {
      background-image: url("/assets/images/header-drip.png");
      background-repeat: repeat-x;
      background-size: auto 100%;
      background-position: top center;
      min-height: 120px;
    }

    @keyframes popIn {
      0% { transform: scale(0.8) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .animate-pop { animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(78, 52, 46, 0.1);
      border-radius: 40px;
      box-shadow: 0 30px 60px rgba(78, 52, 46, 0.12);
    }

    .confetti-piece {
      position: fixed;
      top: -20px;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      z-index: 0;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(540deg); }
    }

    .btn-chocolate {
      background: var(--primary-brown);
      color: white;
      border-radius: 999px;
      box-shadow: 0 12px 24px rgba(78, 52, 46, 0.3);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-chocolate:hover {
      transform: translateY(-2px) scale(1.05);
      background: var(--secondary-brown);
    }
    
    .check-ring {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .check-ring::before {
        content: '';
        position: absolute;
        inset: -12px;
        border: 2px solid var(--success-green);
        border-radius: 50%;
        opacity: 0.3;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.3; }
        100% { transform: scale(1.4); opacity: 0; }
    }

    /* Mobile Tab Bar Header */
    @media (max-width: 768px) {
      .mobile-tab-bar {
        position: fixed;
        bottom: 12px;
        left: 12px;
        right: 12px;
        background: var(--primary-brown);
        height: 64px;
        border-radius: 20px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }
      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: rgba(255,255,255,0.6);
        font-size: 10px;
        font-weight: 700;
        min-width: 50px;
        min-height: 48px;
        justify-content: center;
        text-decoration: none;
      }
      .tab-item.active { color: white; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="header-drip"></header>

  <main class="relative z-10 mx-auto flex flex-1 flex-col items-center justify-center px-6 pb-20 text-center">
    <div class="animate-pop glass-card w-full max-w-xl px-8 py-12 md:px-12">
      <div class="check-ring mx-auto mb-8 h-24 w-24">
          <div class="flex h-full w-full items-center justify-center rounded-full bg-green-50 shadow-inner">
            <svg width="60" height="60" viewBox="0 0 52 52" fill="none" class="text-green-600">
                <path d="M14 27l8 8 16-17" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
                      style="stroke-dasharray: 50; stroke-dashoffset: 50; animation: draw 0.6s 0.4s ease forwards;" />
            </svg>
          </div>
      </div>

      <h1 class="nosifer text-2xl md:text-3xl tracking-tight text-[var(--primary-brown)]">Order Success!</h1>
      <p id="successMessage" class="mt-4 text-sm font-semibold text-[var(--text-muted)]">Your wholesale request is being prepared for a sweet delivery.</p>

      <div class="mt-10 space-y-4 rounded-3xl bg-[#fffcf0] p-6 text-left border border-yellow-100/50">
        <div class="flex items-center justify-between border-b border-yellow-200/30 pb-3">
          <span class="text-xs font-extrabold uppercase tracking-widest text-[var(--text-muted)]">Order ID</span>
          <span id="orderId" class="lilita text-xl text-[var(--accent-red)]">#MIC-0000</span>
        </div>
        <div class="flex items-center justify-between border-b border-yellow-200/30 pb-3">
          <span class="text-xs font-extrabold uppercase tracking-widest text-[var(--text-muted)]">Grand Total</span>
          <span id="orderTotal" class="font-bold text-lg">&#8377;0</span>
        </div>
        <div>
          <span class="text-xs font-extrabold uppercase tracking-widest text-[var(--text-muted)]">Shipping To</span>
          <p id="deliveryAddress" class="mt-2 text-xs font-semibold leading-relaxed text-[var(--primary-brown)]">Address not available.</p>
        </div>
      </div>

      <div class="mt-10 flex flex-col gap-4 sm:flex-row">
        <a href="/#/products" class="btn-chocolate flex-1 py-4 text-xs font-extrabold uppercase tracking-[0.2em]">Add More Scoops</a>
        <a id="supportButton" href="#" class="flex-1 rounded-full border-2 border-[var(--primary-brown)] py-4 text-xs font-extrabold uppercase tracking-[0.2em] text-[var(--primary-brown)] hover:bg-[var(--primary-brown)] hover:text-white transition-all">WhatsApp Support</a>
      </div>
    </div>

    <p class="mt-12 text-[10px] uppercase tracking-widest font-extrabold text-[var(--text-muted)] opacity-50 pb-20 md:pb-0">Thank you for choosing Mishti Ice Cream</p>
  </main>

  <nav class="mobile-tab-bar md:hidden">
    <a href="/index.html#/home" class="tab-item"><span>🏠</span><span>Home</span></a>
    <a href="/index.html#/products" class="tab-item"><span>🍦</span><span>Scoops</span></a>
    <a href="/cart.html" class="tab-item"><span>🛒</span><span>Cart</span></a>
    <a href="/index.html#/contact" class="tab-item"><span>📞</span><span>Connect</span></a>
  </nav>

  <style>
    @keyframes draw { to { stroke-dashoffset: 0; } }
  </style>

  <script>
    const LAST_ORDER_KEY = "mishti_last_order";

    const updateSuccessContent = () => {
      let payload = null;
      try {
        const stored = localStorage.getItem(LAST_ORDER_KEY);
        payload = stored ? JSON.parse(stored) : null;
      } catch (e) {}

      const orderId = payload?.metadata?.orderId || `#MIC-${Math.floor(1000 + Math.random() * 9000)}`;
      const name = payload?.customer?.name || "Customer";
      const total = payload?.summary?.grandTotal ?? 0;
      const address = payload?.customer?.address || "Address details stored.";

      document.getElementById("orderId").textContent = orderId;
      document.getElementById("orderTotal").textContent = `\u20B9${total.toLocaleString()}`;
      document.getElementById("deliveryAddress").textContent = address;
      document.getElementById("successMessage").textContent = `Sweet news, ${name}! We've received your request and will contact you shortly.`;

      const supportButton = document.getElementById("supportButton");
      const waMessage = `Hi Mishti Team! I just placed wholesale order ${orderId} and want to confirm details.`;
      supportButton.href = `https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(waMessage)}`; // Replace with real number if known
    };

    const launchConfetti = () => {
      const colors = ["#FF4081", "#4E342E", "#FFD700", "#1fa2d6", "#8B2C2C"];
      const shapes = ["circle", "square"];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (Math.random() * 2 + 3) + "s";
        piece.style.opacity = Math.random() * 0.5 + 0.5;
        piece.style.width = (Math.random() * 8 + 8) + "px";
        piece.style.height = (Math.random() * 10 + 5) + "px";
        piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5000);
      }
    };

    updateSuccessContent();
    launchConfetti();
  </script>
</body>
</html>
