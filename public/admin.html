<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mishti Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-brown: #4E342E;
      --secondary-brown: #5D4037;
      --bg-light: #f8fafc;
    }

    body {
      font-family: "Poppins", sans-serif;
      background-color: var(--bg-light);
      color: #1e293b;
    }

    .lilita { font-family: "Lilita One", cursive; }

    .card {
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.03);
    }

    .order-table {
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    .order-row {
      background: #fff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
    }

    .order-row td {
      padding: 16px 14px;
      border-top: 1px solid #eef2f7;
      border-bottom: 1px solid #eef2f7;
      vertical-align: top;
    }

    .order-row td:first-child {
      border-left: 1px solid #eef2f7;
      border-top-left-radius: 16px;
      border-bottom-left-radius: 16px;
    }

    .order-row td:last-child {
      border-right: 1px solid #eef2f7;
      border-top-right-radius: 16px;
      border-bottom-right-radius: 16px;
    }

    .btn-chocolate {
      background: var(--primary-brown);
      color: #fff;
      border-radius: 12px;
      transition: background 0.2s ease;
    }

    .btn-chocolate:hover {
      background: var(--secondary-brown);
    }
  </style>
</head>
<body>
  <main class="mx-auto max-w-7xl p-4 md:p-8">
    <header class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <h1 class="lilita text-4xl text-[var(--primary-brown)]">Admin Users</h1>
        <p class="text-sm font-semibold uppercase tracking-widest text-gray-500">Users from API with product names</p>
      </div>
      <div class="flex w-full gap-3 md:w-auto">
        <input id="searchInput" type="text" placeholder="Search name, phone, email, product"
          class="h-11 w-full rounded-xl border border-gray-200 px-4 text-sm font-medium outline-none focus:border-[var(--primary-brown)] md:w-96" />
        <button onclick="downloadCSV()" class="btn-chocolate h-11 px-5 text-xs font-bold uppercase tracking-wider">Export CSV</button>
      </div>
    </header>

    <section class="mb-8 grid grid-cols-1 gap-4 md:grid-cols-3">
      <div class="card p-5">
        <p class="text-[11px] font-bold uppercase tracking-widest text-gray-400">Total Users</p>
        <h2 id="statUsers" class="mt-2 text-3xl font-extrabold">0</h2>
      </div>
      <div class="card p-5">
        <p class="text-[11px] font-bold uppercase tracking-widest text-gray-400">Total Product Lines</p>
        <h2 id="statProducts" class="mt-2 text-3xl font-extrabold">0</h2>
      </div>
      <div class="card p-5">
        <p class="text-[11px] font-bold uppercase tracking-widest text-gray-400">API Endpoint</p>
        <h2 class="mt-2 text-sm font-bold text-[var(--primary-brown)] break-all">/api/users</h2>
      </div>
    </section>

    <section class="card p-4 md:p-6">
      <div class="overflow-x-auto">
        <table class="order-table w-full min-w-[900px]">
          <thead>
            <tr class="text-left text-[11px] font-extrabold uppercase tracking-[0.18em] text-gray-400">
              <th class="pl-3 pb-3">Name</th>
              <th class="pb-3">Phone</th>
              <th class="pb-3">Email</th>
              <th class="pb-3">Products</th>
              <th class="pb-3 text-right pr-3">Action</th>
            </tr>
          </thead>
          <tbody id="orderTable"></tbody>
        </table>
      </div>
      <div id="noResults" class="hidden py-14 text-center">
        <h3 class="text-lg font-bold text-gray-400">No users found</h3>
      </div>
    </section>
  </main>

  <div id="itemsModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
    <div class="w-full max-w-xl overflow-hidden rounded-3xl bg-white shadow-2xl">
      <div class="flex items-center justify-between bg-[var(--primary-brown)] px-6 py-5 text-white">
        <div>
          <h2 class="text-lg font-extrabold">User Details</h2>
          <p id="modalOrderId" class="text-xs font-semibold uppercase tracking-wider opacity-70"></p>
        </div>
        <button id="closeModal" class="h-9 w-9 rounded-full bg-white/10 text-xl leading-none">x</button>
      </div>
      <div id="modalContent" class="max-h-[60vh] space-y-4 overflow-y-auto p-6"></div>
      <div class="flex gap-3 border-t border-gray-100 p-5">
        <button id="downloadSingleBtn" class="flex-1 rounded-xl border border-green-200 bg-green-50 py-3 text-sm font-bold text-green-700">Download</button>
        <button id="callClientBtn" class="flex-1 rounded-xl bg-[var(--primary-brown)] py-3 text-sm font-bold text-white">Call</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api/users";
    let users = [];

    const orderTable = document.getElementById("orderTable");
    const searchInput = document.getElementById("searchInput");
    const itemsModal = document.getElementById("itemsModal");
    const modalContent = document.getElementById("modalContent");

    const normalizeUser = (user, index) => ({
      id: user._id || user.id || `USER-${index + 1}`,
      name: user.name || "N/A",
      email: user.email || "",
      phone: user.phone || "",
      product: Array.isArray(user.product) ? user.product : []
    });

    const productLabel = (p) => `${p.name || "Unknown"} (${Number(p.qty) || 0})`;

    const escapeHtml = (value) =>
      String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    const render = () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = users.filter((u) => {
        const productsText = u.product.map((p) => p.name || "").join(" ").toLowerCase();
        return (
          u.name.toLowerCase().includes(q) ||
          u.phone.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q) ||
          productsText.includes(q)
        );
      });

      document.getElementById("noResults").classList.toggle("hidden", filtered.length > 0);

      orderTable.innerHTML = filtered.map((u) => `
        <tr class="order-row">
          <td><span class="font-extrabold text-[var(--primary-brown)]">${escapeHtml(u.name)}</span></td>
          <td><a href="tel:${escapeHtml(u.phone)}" class="font-bold text-blue-600">${escapeHtml(u.phone || "N/A")}</a></td>
          <td><span class="font-semibold text-gray-700">${escapeHtml(u.email || "N/A")}</span></td>
          <td><span class="text-sm font-semibold text-gray-700">${escapeHtml(u.product.length ? u.product.map(productLabel).join(", ") : "No products")}</span></td>
          <td class="text-right">
            <button onclick="viewItems('${escapeHtml(u.id)}')" class="rounded-lg bg-gray-100 px-3 py-2 text-xs font-bold text-gray-700">View</button>
          </td>
        </tr>
      `).join("");

      document.getElementById("statUsers").textContent = String(users.length);
      document.getElementById("statProducts").textContent = String(users.reduce((sum, u) => sum + u.product.length, 0));
    };

    window.viewItems = (id) => {
      const user = users.find((u) => String(u.id) === String(id));
      if (!user) return;

      document.getElementById("modalOrderId").textContent = user.id;
      modalContent.innerHTML = `
        <div class="grid grid-cols-2 gap-4 rounded-xl border border-gray-100 bg-gray-50 p-4">
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Name</p>
            <p class="text-sm font-bold text-gray-800">${escapeHtml(user.name)}</p>
          </div>
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Phone</p>
            <p class="text-sm font-bold text-blue-600">${escapeHtml(user.phone || "N/A")}</p>
          </div>
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Email</p>
            <p class="text-sm font-bold text-gray-800">${escapeHtml(user.email || "N/A")}</p>
          </div>
        </div>
        <div class="space-y-3">
          <h3 class="text-[10px] font-extrabold uppercase tracking-widest text-gray-400">Products</h3>
          ${user.product.length ? user.product.map((p) => `
            <div class="flex items-center justify-between rounded-xl border border-gray-100 bg-white p-4">
              <div>
                <p class="font-bold text-[var(--primary-brown)]">${escapeHtml(p.name || "Unknown")}</p>
                <p class="text-[11px] font-semibold text-gray-500">Amount: ${Number(p.amount) || 0}</p>
              </div>
              <div class="text-right">
                <p class="text-xl font-extrabold text-red-700">${Number(p.qty) || 0}</p>
                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Qty</p>
              </div>
            </div>
          `).join("") : `<p class="text-sm font-semibold text-gray-500">No products found.</p>`}
        </div>
      `;

      document.getElementById("downloadSingleBtn").onclick = () => downloadCSV([user], `User_${user.id}`);
      document.getElementById("callClientBtn").onclick = () => {
        if (user.phone) window.location.href = `tel:${user.phone}`;
      };

      itemsModal.classList.remove("hidden");
      itemsModal.classList.add("flex");
    };

    window.downloadCSV = (data = users, filename = "Mishti_Users") => {
      if (data.length === 0) return alert("No users to export.");

      let csvContent = "User ID,Name,Email,Phone,Products\n";
      data.forEach((u) => {
        const productsStr = u.product.map(productLabel).join(" | ");
        const row = [
          u.id,
          `"${u.name.replace(/"/g, '""')}"`,
          `"${(u.email || "").replace(/"/g, '""')}"`,
          `"${(u.phone || "").replace(/"/g, '""')}"`,
          `"${productsStr.replace(/"/g, '""')}"`
        ].join(",");
        csvContent += `${row}\n`;
      });

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `${filename}_${new Date().toLocaleDateString().replace(/\//g, "-")}.csv`);
      link.style.visibility = "hidden";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    const loadUsers = async () => {
      try {
        const response = await fetch(API_URL, {
          method: "GET",
          headers: { "Content-Type": "application/json" }
        });
        if (!response.ok) throw new Error("Failed to fetch users");

        const data = await response.json();
        const list = Array.isArray(data) ? data : (Array.isArray(data.users) ? data.users : []);
        users = list.map(normalizeUser);
        render();
      } catch (error) {
        users = [];
        render();
        alert(error.message || "Unable to load users from API.");
      }
    };

    document.getElementById("closeModal").onclick = () => {
      itemsModal.classList.add("hidden");
      itemsModal.classList.remove("flex");
    };
    searchInput.oninput = render;

    loadUsers();
  </script>
</body>
</html>
